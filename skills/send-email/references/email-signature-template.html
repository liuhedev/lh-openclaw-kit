<table cellpadding="0" cellspacing="0" border="0" style="font-family: 'PingFang SC', 'Microsoft YaHei', Helvetica, Arial, sans-serif; color: #333; line-height: 1.8; border-collapse: collapse; max-width: 500px;">
  <tr>
    <td style="padding: 0 0 8px 0;">
      <span style="font-size: 18px; font-weight: bold; color: #333;">{{ name }}</span>
      <span style="margin-left: 12px; font-size: 13px; color: #999;">{{ department }}</span>
    </td>
  </tr>
  <tr>
    <td style="padding: 8px 0 0 0;">
      <table cellpadding="0" cellspacing="0" border="0" style="font-size: 13px; color: #333;">
        <tr>
          <td style="padding-bottom: 4px;">
            <span style="color: #4CAF50; font-weight: bold;">MOB.</span><span style="margin-left: 4px;">{{ mobile }}</span>
          </td>
        </tr>
        <tr>
          <td style="padding-bottom: 4px;">
            <a href="mailto:{{ email }}" style="color: #333; text-decoration: none;">{{ email }}</a>
          </td>
        </tr>
        <tr>
          <td>
            <span style="color: #4CAF50; font-weight: bold;">ADD.</span><span style="margin-left: 4px;">{{ address }}</span>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
